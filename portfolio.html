<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portfolio — Whitsunday Web Studio</title>
<meta name="description" content="Portfolio of web design and development work by Whitsunday Web Studio. Coming soon.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Agdasima:wght@700&family=Inter:wght@400;500;600&family=Plus+Jakarta+Sans:wght@700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/wws.css">
<style>
.coming-soon{
  min-height:100vh;
  display:flex;align-items:center;
  justify-content:center;
  text-align:center;
  padding:2rem 5%;
  position:relative;
  overflow:hidden;
}
.coming-soon::before{
  content:'';position:absolute;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  width:600px;height:600px;
  background:radial-gradient(circle,rgba(212,97,26,0.08) 0%,transparent 70%);
  pointer-events:none;
}
.coming-soon-inner{
  position:relative;z-index:1;
  max-width:560px;
}
.coming-soon-icon{
  width:72px;height:72px;
  background:rgba(212,97,26,0.1);
  border:1px solid rgba(212,97,26,0.2);
  border-radius:50%;
  display:flex;align-items:center;
  justify-content:center;
  margin:0 auto 2rem;
}
.coming-soon-tag{
  display:inline-block;
  background:rgba(212,97,26,0.12);
  border:1px solid rgba(212,97,26,0.25);
  color:var(--orange-tint);
  font-size:0.7rem;font-weight:700;
  letter-spacing:0.18em;text-transform:uppercase;
  padding:0.4rem 1rem;border-radius:20px;
  margin-bottom:1.5rem;
}
.coming-soon h1{
  font-family:'Agdasima',sans-serif;
  font-size:clamp(2.8rem,6vw,4.5rem);
  color:var(--white);line-height:1.0;
  margin-bottom:1.25rem;
}
.coming-soon p{
  font-size:0.95rem;color:var(--text-muted);
  line-height:1.85;margin-bottom:2.5rem;
}
.coming-soon-actions{
  display:flex;gap:1rem;
  justify-content:center;flex-wrap:wrap;
}
</style>
</head>
<body>
<div id="nav-placeholder"></div>

<section class="coming-soon">
  <div class="coming-soon-inner">
    <div class="coming-soon-icon">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#D4611A" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
    </div>
    <span class="coming-soon-tag">Portfolio</span>
    <h1>Work in progress.</h1>
    <p>The portfolio is being put together right now. Real projects, real results — check back soon to see what's been built.</p>
    <div class="coming-soon-actions">
      <a class="btn-primary" href="/">Back to home</a>
      <a class="btn-ghost" href="/contact.html">Get in touch</a>
    </div>
  </div>
</section>

<div id="footer-placeholder"></div>
<script src="/wws-components.js"></script>
</body>
</html>
